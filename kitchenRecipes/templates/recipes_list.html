{% extends "base.html" %}

{% block title %}Recipes List{% endblock %}

{% block content %}
    <h2>Recipes List</h2>
    
    <div class="row">
        {% for recipe in recipes %}
            <div class="col-md-4">
                <div class="card mb-4">
                    <img src="{{ recipe.image.url }}" class="card-img-top" alt="{{ recipe.name }}">
                    <div class="card-body">
                        <h5 class="card-title">{{ recipe.name }}</h5>
                        <p class="card-text">{{ recipe.description }}</p>
                        <!-- <a href="{% url 'kitchenRecipes:recipe-detail' recipe.id %}" class="btn btn-primary">View Details</a> -->
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
{% endblock %}
